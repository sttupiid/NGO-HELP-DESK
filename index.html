<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Human Rights — Global Justice Movement</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,700&family=Syne:wght@400;500;600;700;800&family=DM+Sans:wght@300;400;500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --yellow: #f5c518;
      --yellow-bright: #ffd633;
      --yellow-dark: #c9a000;
      --yellow-pale: #fff8d6;
      --yellow-mid: #fde68a;
      --black: #050505;
      --dark: #0d0d0d;
      --darker: #000000;
      --gray: #6b7280;
      --gray-light: #f3f4f6;
      --white: #ffffff;
      --bg: #fafaf7;
      --chat-bg: #fffdf0;
      --accent-red: #ff3b30;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { overflow-x: hidden; max-width: 100%; width: 100%; scroll-behavior: smooth; }
    body { font-family: 'DM Sans', sans-serif; background: var(--black); color: var(--dark); min-height: 100vh; }

    /* Custom scrollbar */
    ::-webkit-scrollbar { width: 10px; }
    ::-webkit-scrollbar-track { background: #0a0a0a; }
    ::-webkit-scrollbar-thumb { background: linear-gradient(180deg, var(--yellow), var(--yellow-dark)); border-radius: 10px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--yellow-bright); }

    /* Selection */
    ::selection { background: var(--yellow); color: var(--black); }

    /* ─── PAGE VIEWS ─── */
    #page-landing, #page-helpdesk, #page-login { display: none; }
    #page-landing.active { display: block; }
    #page-login.active { display: flex !important; }

    /* HELPDESK — CRITICAL FIX: use fixed positioning so it always fills the viewport */
    #page-helpdesk {
      display: none;
      position: fixed;
      inset: 0;
      flex-direction: column;
      overflow: hidden;
      background: linear-gradient(180deg, #fffbe8 0%, #fffdf0 100%);
      z-index: 500;
    }
    #page-helpdesk.active {
      display: flex;
    }

    /* ═══════════════════════════════════════
       MARQUEE TICKER
    ═══════════════════════════════════════ */
    .ticker {
      position: fixed; top: 0; left: 0; right: 0; z-index: 101;
      background: var(--yellow);
      color: var(--black);
      overflow: hidden;
      height: 32px;
      display: flex;
      align-items: center;
      border-bottom: 1px solid rgba(0,0,0,0.15);
    }
    .ticker-track {
      display: flex;
      gap: 48px;
      animation: tickerScroll 40s linear infinite;
      white-space: nowrap;
      padding-left: 48px;
    }
    .ticker-item {
      font-family: 'Syne', sans-serif;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .ticker-item::before {
      content: '◆';
      color: var(--black);
      font-size: 8px;
    }
    @keyframes tickerScroll {
      from { transform: translateX(0); }
      to { transform: translateX(-50%); }
    }

    /* ─── NAVBAR ─── */
    nav {
      position: fixed; top: 32px; left: 0; right: 0; z-index: 100;
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 52px;
      background: rgba(5,5,5,0.55);
      backdrop-filter: blur(28px) saturate(180%);
      -webkit-backdrop-filter: blur(28px) saturate(180%);
      border-bottom: 1px solid rgba(245,197,24,0.08);
      transition: all 0.3s ease;
    }
    .nav-logo { display: flex; align-items: center; gap: 12px; cursor: pointer; transition: transform 0.3s; }
    .nav-logo:hover { transform: scale(1.03); }
    .nav-logo-icon { width: 38px; height: 38px; filter: drop-shadow(0 0 12px rgba(245,197,24,0.4)); }
    .nav-logo-text { font-family: 'Syne', sans-serif; font-size: 17px; font-weight: 800; color: #fff; letter-spacing: -0.3px; }
    .nav-logo-text span { color: var(--yellow); }
    .nav-links { display: flex; gap: 36px; align-items: center; }
    .nav-links a {
      text-decoration: none; color: rgba(255,255,255,0.55);
      font-size: 12px; font-weight: 600; letter-spacing: 0.1em;
      transition: all 0.25s; font-family: 'Syne', sans-serif; text-transform: uppercase;
      position: relative; padding: 4px 0;
    }
    .nav-links a::after {
      content: ''; position: absolute; bottom: 0; left: 0; width: 0; height: 1px;
      background: var(--yellow); transition: width 0.3s ease;
    }
    .nav-links a:hover { color: var(--yellow); }
    .nav-links a:hover::after { width: 100%; }

    .nav-auth { display: flex; align-items: center; gap: 12px; }
    .nav-login-btn {
      background: transparent; color: var(--yellow);
      border: 1px solid rgba(245,197,24,0.45); border-radius: 4px;
      padding: 9px 22px; font-size: 12px; font-weight: 700;
      cursor: pointer; transition: all 0.3s;
      font-family: 'Syne', sans-serif; letter-spacing: 0.1em; text-transform: uppercase;
      position: relative; overflow: hidden;
    }
    .nav-login-btn::before {
      content: ''; position: absolute; inset: 0;
      background: var(--yellow); transform: translateX(-101%);
      transition: transform 0.4s cubic-bezier(0.65, 0, 0.35, 1); z-index: -1;
    }
    .nav-login-btn:hover { color: var(--black); border-color: var(--yellow); }
    .nav-login-btn:hover::before { transform: translateX(0); }

    .nav-user-pill {
      display: none; align-items: center; gap: 10px;
      background: rgba(245,197,24,0.08);
      border: 1px solid rgba(245,197,24,0.3);
      border-radius: 24px; padding: 6px 16px 6px 6px;
      transition: all 0.3s;
    }
    .nav-user-pill:hover { background: rgba(245,197,24,0.14); }
    .nav-user-pill.show { display: flex; }
    .nav-avatar {
      width: 30px; height: 30px; border-radius: 50%;
      background: linear-gradient(135deg, var(--yellow-bright), var(--yellow-dark));
      display: flex; align-items: center; justify-content: center;
      font-family: 'Syne', sans-serif; font-size: 12px; font-weight: 800; color: var(--black);
      box-shadow: 0 0 16px rgba(245,197,24,0.4);
    }
    .nav-user-name { font-family: 'Syne', sans-serif; font-size: 12px; font-weight: 600; color: rgba(255,255,255,0.85); }
    .nav-logout-btn {
      background: none; border: none; color: rgba(255,255,255,0.4);
      font-size: 11px; cursor: pointer; font-family: 'Syne', sans-serif;
      text-transform: uppercase; letter-spacing: 0.06em; transition: color 0.2s;
      padding: 0 0 0 8px; border-left: 1px solid rgba(255,255,255,0.15);
    }
    .nav-logout-btn:hover { color: var(--accent-red); }

    /* ═══════════════════════════════════════
       HERO — CINEMATIC
    ═══════════════════════════════════════ */
    .hero {
      min-height: 100vh; display: flex; align-items: center;
      padding: 180px 52px 100px; position: relative; overflow: hidden;
      background: var(--black); width: 100%;
    }

    /* Animated grid background */
    .hero-grid {
      position: absolute; inset: 0;
      background-image:
        linear-gradient(rgba(245,197,24,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(245,197,24,0.04) 1px, transparent 1px);
      background-size: 60px 60px;
      mask-image: radial-gradient(ellipse 80% 60% at 50% 50%, black 30%, transparent 80%);
      -webkit-mask-image: radial-gradient(ellipse 80% 60% at 50% 50%, black 30%, transparent 80%);
    }

    .hero-grain {
      position: absolute; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.06'/%3E%3C/svg%3E");
      pointer-events: none; opacity: 0.5; mix-blend-mode: overlay;
    }

    .hero-orb {
      position: absolute; border-radius: 50%;
      filter: blur(80px); opacity: 0.5;
      animation: floatOrb 20s ease-in-out infinite;
    }
    .hero-orb.o1 { top: -10%; right: -5%; width: 600px; height: 600px; background: radial-gradient(circle, rgba(245,197,24,0.35) 0%, transparent 70%); }
    .hero-orb.o2 { bottom: -15%; left: 5%; width: 500px; height: 500px; background: radial-gradient(circle, rgba(245,197,24,0.18) 0%, transparent 70%); animation-delay: -7s; }
    .hero-orb.o3 { top: 40%; left: 40%; width: 400px; height: 400px; background: radial-gradient(circle, rgba(255, 59, 48, 0.08) 0%, transparent 70%); animation-delay: -14s; }
    @keyframes floatOrb {
      0%, 100% { transform: translate(0, 0) scale(1); }
      33% { transform: translate(40px, -30px) scale(1.05); }
      66% { transform: translate(-30px, 40px) scale(0.97); }
    }

    .hero-content { max-width: 880px; z-index: 1; position: relative; }

    .hero-badge {
      display: inline-flex; align-items: center; gap: 10px;
      border: 1px solid rgba(245,197,24,0.4);
      background: rgba(245,197,24,0.05);
      backdrop-filter: blur(12px);
      color: var(--yellow); padding: 8px 18px; border-radius: 100px;
      font-size: 11px; font-weight: 700; margin-bottom: 32px;
      font-family: 'Syne', sans-serif; letter-spacing: 0.18em; text-transform: uppercase;
      animation: badgePulse 3s ease-in-out infinite;
    }
    .hero-badge::before {
      content: ''; width: 6px; height: 6px; border-radius: 50%;
      background: var(--yellow); box-shadow: 0 0 8px var(--yellow);
      animation: blink 1.5s infinite;
    }
    @keyframes badgePulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(245,197,24,0.3); }
      50% { box-shadow: 0 0 0 12px rgba(245,197,24,0); }
    }

    h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(48px, 8vw, 96px);
      font-weight: 500; line-height: 0.98; color: var(--white);
      margin-bottom: 32px; letter-spacing: -2px;
    }
    h1 em {
      color: var(--yellow);
      font-style: italic; font-weight: 600;
      background: linear-gradient(135deg, var(--yellow-bright) 0%, var(--yellow) 50%, var(--yellow-dark) 100%);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      position: relative;
      display: inline-block;
    }
    h1 em::after {
      content: ''; position: absolute;
      bottom: 8px; left: 0; right: 0; height: 2px;
      background: linear-gradient(90deg, transparent, var(--yellow), transparent);
      opacity: 0.6;
    }

    .hero-sub {
      font-size: 18px; color: rgba(255,255,255,0.65); line-height: 1.7;
      margin-bottom: 48px; font-weight: 300; max-width: 580px;
    }
    .hero-sub strong { color: var(--yellow); font-weight: 500; }

    .hero-btns { display: flex; gap: 16px; flex-wrap: wrap; align-items: center; }
    .btn-primary {
      background: var(--yellow); color: var(--black); border: none; border-radius: 4px;
      padding: 18px 44px; font-size: 13px; font-weight: 800; cursor: pointer;
      transition: all 0.3s cubic-bezier(0.65, 0, 0.35, 1);
      font-family: 'Syne', sans-serif; letter-spacing: 0.12em; text-transform: uppercase;
      position: relative; overflow: hidden;
      box-shadow: 0 8px 32px rgba(245,197,24,0.25);
    }
    .btn-primary::after {
      content: ''; position: absolute; top: 50%; left: 50%;
      width: 0; height: 0; border-radius: 50%;
      background: rgba(255,255,255,0.4); transform: translate(-50%, -50%);
      transition: width 0.6s, height 0.6s;
    }
    .btn-primary:hover { transform: translateY(-3px); box-shadow: 0 16px 40px rgba(245,197,24,0.4); background: var(--yellow-bright); }
    .btn-primary:hover::after { width: 400px; height: 400px; }

    .btn-secondary {
      background: transparent; color: rgba(255,255,255,0.85);
      border: 1px solid rgba(255,255,255,0.2); border-radius: 4px;
      padding: 18px 44px; font-size: 13px; font-weight: 700; cursor: pointer;
      transition: all 0.3s; font-family: 'Syne', sans-serif;
      letter-spacing: 0.12em; text-transform: uppercase;
      backdrop-filter: blur(10px);
    }
    .btn-secondary:hover {
      border-color: var(--yellow); color: var(--yellow);
      background: rgba(245,197,24,0.05);
      transform: translateY(-3px);
    }

    .hero-stats {
      display: grid; grid-template-columns: repeat(3, auto);
      gap: 64px; margin-top: 80px; padding-top: 48px;
      border-top: 1px solid rgba(255,255,255,0.08);
      max-width: 700px;
    }
    .stat-block { position: relative; }
    .stat-num {
      font-family: 'Cormorant Garamond', serif;
      font-size: 48px; font-weight: 600; color: var(--yellow);
      line-height: 1; letter-spacing: -1px;
      background: linear-gradient(180deg, var(--yellow-bright), var(--yellow-dark));
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .stat-label {
      font-size: 11px; color: rgba(255,255,255,0.5);
      margin-top: 8px; letter-spacing: 0.12em; text-transform: uppercase;
      font-family: 'Syne', sans-serif; font-weight: 600;
    }

    /* Scroll indicator */
    .scroll-hint {
      position: absolute; bottom: 40px; left: 52px;
      display: flex; align-items: center; gap: 14px;
      color: rgba(255,255,255,0.4);
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase;
    }
    .scroll-hint-line {
      width: 60px; height: 1px; background: rgba(255,255,255,0.2);
      position: relative; overflow: hidden;
    }
    .scroll-hint-line::after {
      content: ''; position: absolute; left: -30%; top: 0; width: 30%; height: 100%;
      background: var(--yellow); animation: scrollLine 2s ease-in-out infinite;
    }
    @keyframes scrollLine {
      0% { left: -30%; } 100% { left: 100%; }
    }

    /* ═══════════════════════════════════════
       ABOUT — SPLIT LAYOUT
    ═══════════════════════════════════════ */
    #about-sec {
      background: linear-gradient(180deg, #fafaf7 0%, #ffffff 100%);
      padding: 140px 52px; position: relative;
    }
    #about-sec::before {
      content: 'WHO·WE·ARE·';
      position: absolute; top: 60px; left: -20px; right: 0;
      font-family: 'Syne', sans-serif; font-size: 180px; font-weight: 800;
      color: rgba(245,197,24,0.05); white-space: nowrap; letter-spacing: -4px;
      pointer-events: none; line-height: 1; overflow: hidden;
    }
    .about-inner {
      max-width: 1200px; margin: 0 auto;
      display: grid; grid-template-columns: 1fr 1fr; gap: 80px;
      align-items: center; position: relative;
    }
    .about-label {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px; font-weight: 500; letter-spacing: 0.25em;
      text-transform: uppercase; color: var(--yellow-dark); margin-bottom: 20px;
      display: flex; align-items: center; gap: 12px;
    }
    .about-label::before {
      content: ''; width: 24px; height: 1px; background: var(--yellow-dark);
    }
    .about-h2 {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(36px, 5vw, 56px); font-weight: 500;
      line-height: 1.05; color: var(--black); margin-bottom: 28px;
      letter-spacing: -1px;
    }
    .about-h2 em { color: var(--yellow-dark); font-style: italic; font-weight: 600; }
    .about-p { font-size: 16px; color: var(--gray); line-height: 1.85; margin-bottom: 18px; }
    .about-right { display: flex; flex-direction: column; gap: 24px; }
    .about-quote {
      background: linear-gradient(135deg, var(--yellow-pale), #fff);
      border: 1px solid rgba(245,197,24,0.3);
      border-left: 4px solid var(--yellow);
      padding: 32px 36px; border-radius: 0 12px 12px 0;
      font-family: 'Cormorant Garamond', serif;
      font-size: 24px; line-height: 1.5; color: var(--black);
      font-style: italic; position: relative;
      box-shadow: 0 8px 32px rgba(245,197,24,0.1);
    }
    .about-quote::before {
      content: '"'; position: absolute; top: -20px; left: 24px;
      font-size: 80px; color: var(--yellow); font-style: normal;
      line-height: 1; font-family: 'Cormorant Garamond', serif;
    }
    .about-login-card {
      border: 1px solid rgba(0,0,0,0.08);
      border-radius: 16px; padding: 24px 28px;
      background: var(--white);
      display: flex; align-items: center; justify-content: space-between; gap: 20px;
      transition: all 0.3s; position: relative; overflow: hidden;
    }
    .about-login-card::before {
      content: ''; position: absolute; top: 0; left: 0; width: 4px; height: 100%;
      background: var(--yellow); transform: scaleY(0); transform-origin: top;
      transition: transform 0.4s ease;
    }
    .about-login-card:hover { border-color: rgba(245,197,24,0.3); transform: translateX(4px); }
    .about-login-card:hover::before { transform: scaleY(1); }

    .alc-text { flex: 1; }
    .alc-title { font-family: 'Syne', sans-serif; font-size: 14px; font-weight: 700; color: var(--black); margin-bottom: 6px; letter-spacing: 0.02em; }
    .alc-sub { font-size: 13px; color: var(--gray); line-height: 1.6; }
    .alc-btn {
      background: var(--black); color: var(--yellow); border: none; border-radius: 8px;
      padding: 13px 26px; font-size: 12px; font-weight: 700; cursor: pointer;
      transition: all 0.25s; white-space: nowrap; font-family: 'Syne', sans-serif;
      letter-spacing: 0.08em; text-transform: uppercase; flex-shrink: 0;
    }
    .alc-btn:hover { background: var(--yellow); color: var(--black); transform: scale(1.05); }

    /* ═══════════════════════════════════════
       SERVICES — BENTO
    ═══════════════════════════════════════ */
    .services {
      padding: 140px 52px;
      background: linear-gradient(180deg, #ffffff 0%, var(--bg) 100%);
      position: relative;
    }
    .section-tag {
      text-align: center; color: var(--yellow-dark);
      font-size: 11px; font-weight: 700; letter-spacing: 0.25em;
      text-transform: uppercase; margin-bottom: 20px;
      font-family: 'JetBrains Mono', monospace;
      display: flex; align-items: center; justify-content: center; gap: 16px;
    }
    .section-tag::before, .section-tag::after {
      content: ''; width: 32px; height: 1px; background: var(--yellow-dark); opacity: 0.5;
    }
    .section-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(40px, 6vw, 64px);
      font-weight: 500; text-align: center; margin-bottom: 80px;
      color: var(--black); line-height: 1.05; letter-spacing: -1.5px;
    }
    .section-title em { color: var(--yellow-dark); font-style: italic; font-weight: 600; }

    .services-grid {
      display: grid; grid-template-columns: repeat(3, 1fr);
      gap: 16px; max-width: 1280px; margin: 0 auto;
    }
    .service-card {
      background: var(--white);
      border: 1px solid rgba(0,0,0,0.06);
      border-radius: 16px;
      padding: 36px 32px;
      transition: all 0.4s cubic-bezier(0.65, 0, 0.35, 1);
      position: relative; overflow: hidden;
      cursor: pointer;
    }
    .service-card::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 0;
      background: linear-gradient(135deg, var(--yellow), var(--yellow-bright));
      transition: height 0.4s ease; z-index: 0;
    }
    .service-card:hover {
      transform: translateY(-8px);
      box-shadow: 0 24px 60px rgba(0,0,0,0.08);
      border-color: rgba(245,197,24,0.4);
    }
    .service-card:hover::before { height: 4px; }
    .service-card:hover .service-arrow { transform: translate(4px, -4px); color: var(--yellow-dark); }

    .service-card-top {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 24px; position: relative; z-index: 1;
    }
    .service-num {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px; font-weight: 500; letter-spacing: 0.15em;
      color: var(--yellow-dark); text-transform: uppercase;
    }
    .service-arrow {
      font-size: 20px; color:
